opencollection: 1.0.0

info:
  name: Gaming Backlog
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  headers:
    - name: Client-ID
      value: "{{CLIENT_ID}}"
  auth:
    type: bearer
    token: "{{ACCESS_TOKEN}}"
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
