<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
    <head>
        <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
        <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">

        <!-- bootstrap -->
        {{ bootstrap.load_css() }}
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

        <!-- jquery -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>

        <!-- Datatables -->
        <link href="https://cdn.datatables.net/v/bs5/dt-2.3.4/cc-1.1.0/r-3.0.6/sp-2.3.5/sl-3.1.0/datatables.min.css" rel="stylesheet" integrity="sha384-MZkO339dCjeS1MkLWstsPYgYWb8SFljcH/GBVr1Dj4N2WKoF/rdZkFP5mjtcONFt" crossorigin="anonymous">
        <script src="https://cdn.datatables.net/v/bs5/dt-2.3.4/cc-1.1.0/r-3.0.6/sp-2.3.5/sl-3.1.0/datatables.min.js" integrity="sha384-Y0bFQc7MwCqLDUDJdUVSZLfR7Sa5DKqwn4GQU4iw/YXy2H3ef6KxeOJ9/3lYlQOJ" crossorigin="anonymous"></script>

        <title>{% block title %}{% endblock %} - Gaming Backlog</title>
    </head>
<body>

<nav class="navbar navbar-expand-lg bg-body-secondary sticky-top">
    <div class="container-xxl">
        <a class="navbar-brand" href="{{ url_for('index') }}">Backlog</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNavDropdown">
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('index') }}">Home</a>
                <a class="nav-link" href="{{ url_for('backlog.add') }}">Add Game</a>
                <a class="nav-link" href="{{ url_for('backlog.random') }}">Choose Random</a>
                <a class="nav-link" href="{{ url_for('backlog.queue') }}">Queue</a>
            </div>
        </div>
    </div>
</nav>

<div class="container-sm my-3">
    <header>
        {% block header %}{% endblock %}
    </header>
    {% block content %}{% endblock %}
</div>

{{ bootstrap.load_js() }}
{% block scripts %}{% endblock %}

</body>
</html>
