{% extends 'base.html' %}
{% block content %}
    <table class="table table-hover" id="gamesTable">
        <thead>
            <tr>
                <th scope="col">Title</th>
                <th scope="col">Launcher</th>
                <th scope="col">ProtonDB</th>
                <th scope="col">Order</th>
            </tr>
        </thead>
        <tbody>
            {% for game in games %}
                <tr class="clickable-row" data-href="{{ url_for('backlog.detail', id=game.id) }}">
                    <td><img src="{{ igdb_build_cover_url(game.igdb_image_id, 'micro') }}" style="height: 1.5rem">  {{ game.title }}</td>
                    <td>{{ game.launcher.name }}</td>
                    <td><i class="bi bi-star-fill" style="color:#{{ game.proton.hex_color }}"></i> {{ game.proton.rating }}</td>
                    <td>{{ game.queue_order }}.</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}

{% block scripts %}
    <script src="{{ url_for('static', filename='queue.js') }}"></script>
{% endblock %}
